# The manifest for the "worker" service.
# Read the full specification for the "Backend Service" type at:
#  https://aws.github.io/copilot-cli/docs/manifest/backend-service/

name: worker
type: Backend Service

image:
  build: Dockerfile

# Celery worker: listen on all 3 priority queues + DLQ
command: ["celery", "-A", "src.worker.celery_app", "worker",
          "--loglevel=info", "--concurrency=2",
          "-Q", "documents.fast,documents.normal,documents.heavy"]

# Increased from 1024/2048 — unstructured YOLOX layout model needs ~1.5GB RAM.
# 2 vCPU gives meaningful speedup for parallel PDF page processing.
cpu: 2048       # 2 vCPU per worker task
memory: 4096    # 4 GB RAM (YOLOX ~500MB + PDF bytes in memory per worker)
platform: linux/x86_64
exec: true      # Allow `copilot svc exec` for debugging

# Layer 3: CPU-based autoscaling (simple, works today without custom metrics).
# ECS scales when CPU exceeds 70% — correlates with active PDF processing.
# Workers 2-5 use Fargate Spot (70% cheaper); worker 1 is always on-demand
# so there's always one warm container ready.
# Celery handles Spot reclamation gracefully via task_acks_late + task_reject_on_worker_lost.
count:
  range:
    min: 1
    max: 5
    spot_from: 2    # Workers 2-5 use Fargate Spot; worker 1 is always on-demand
  cpu_percentage: 70

network:
  connect: true

variables:
  REDIS_URL: redis://redis:6379/0
  # A1: match per-doc page parallelism to the 2 vCPUs above (was 4 → oversubscribed).
  # With --concurrency=2, keep this at 2 so we don't exceed 2 CPU-bound processes.
  PDF_PARALLEL_WORKERS: "2"
env_file: .env

